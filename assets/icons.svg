<!-- 1. Avocat -- Scales of Justice, isometric -->
<!-- viewBox="0 0 48 48" stroke="#c8956c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" -->
<g id="icon-avocat">
  <g transform="translate(24,24) rotate(-15) skewX(15) translate(-24,-24)">
    <!-- Central pillar -->
    <line x1="24" y1="12" x2="24" y2="38"/>
    <!-- Base -->
    <line x1="17" y1="38" x2="31" y2="38"/>
    <!-- Crossbar -->
    <line x1="10" y1="16" x2="38" y2="16"/>
    <!-- Top cap -->
    <circle cx="24" cy="12" r="2"/>
    <!-- Left pan -->
    <path d="M10,16 L7,26 Q10,29 13,26 Z"/>
    <!-- Left chains -->
    <line x1="10" y1="16" x2="7" y2="26"/>
    <line x1="10" y1="16" x2="13" y2="26"/>
    <!-- Right pan -->
    <path d="M38,16 L35,26 Q38,29 41,26 Z"/>
    <!-- Right chains -->
    <line x1="38" y1="16" x2="35" y2="26"/>
    <line x1="38" y1="16" x2="41" y2="26"/>
  </g>
</g>


